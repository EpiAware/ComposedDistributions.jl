[sources]
ADFixtures = {path = "../ADFixtures"}
ComposedDistributions = {path = "../.."}
# `convolved` only exists in ConvolvedDistributions 0.2, which is not yet
# registered (the registry still has 0.1). Pin it by git so the env resolves.
# Drop this once 0.2 is released.
ConvolvedDistributions = {url = "https://github.com/EpiAware/ConvolvedDistributions.jl", rev = "main"}
# Until EpiAwarePackageTools is registered, it is pinned by git so the env
# resolves out of the box. Switch to a local path if you develop the kit
# alongside this package.
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}
