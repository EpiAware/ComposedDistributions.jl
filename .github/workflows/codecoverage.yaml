# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@6fcdcde033ec670ac3832b239427fd2ded591bbc
    with:
      julia_version: '1'
      # Hard-fail the coverage check on an upload error. This is intentional:
      # a repo with no CODECOV_TOKEN cannot upload on a protected branch
      # ('Token required because branch is protected'), so CI goes red as a
      # loud reminder to add the secret. Add CODECOV_TOKEN (repo or org secret)
      # to make coverage upload — and report — for real.
      fail_ci_if_error: true
      # Package extensions carry real code (Mooncake, FlexiChains); count
      # their lines so patch coverage on ext-touching PRs reflects reality.
      # kit#197 now merges this package-owned `with:` key back in
      # automatically, but its merge duplicates the comment that follows the
      # key in the committed file — re-pasted by hand, deduped, until the
      # kit fixes the duplication.
      coverage_directories: 'src,ext'
    secrets: inherit  # pragma: allowlist secret
