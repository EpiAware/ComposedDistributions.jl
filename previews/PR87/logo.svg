     viewBox="0 0 400 300" role="img"
     aria-label="ComposedDistributions.jl logo">
  <title>ComposedDistributions.jl</title>
  <g fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round">
    <line x1="200" y1="70" x2="100" y2="180"/>
    <line x1="200" y1="70" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="300" y2="266"/>
  </g>
  <g stroke="none">
    <circle cx="200" cy="70" r="40" fill="#4063d8"/>
    <circle cx="100" cy="180" r="34" fill="#9558b2"/>
    <circle cx="300" cy="180" r="34" fill="#389826"/>
    <circle cx="300" cy="266" r="26" fill="#cb3c33"/>
  </g>
  <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"
